<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖</title>

<style>

/* RESET + FUNDO */
body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #111, #000);
    font-family: Arial;
}

/* CENTRALIZAÇÃO */
.page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;

    opacity: 0;
    transform: scale(0.95);
    transition: opacity 1s ease, transform 1s ease;
}

/* CONTAINER */
#container {
    text-align: center;
    padding: 20px;
    max-width: 700px;
    width: 100%;
    background: black;
    color: white;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 30px rgba(255, 105, 180, 0.2);
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    cursor: pointer;
    transition: 1s;
}

.intro-content {
    text-align: center;
    color: white;
    animation: pulse 2s infinite;
}

.intro-content h1 {
    font-size: 50px;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 0.8; }
}

/* TEXTO */
#texto {
    opacity: 1;
    transition: opacity 0.5s ease;
}

/* ESTRELAS */
#stars {
    position: absolute;
    width: 100%;
    height: 100%;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: piscar 2s infinite alternate;
}

@keyframes piscar {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

#container > *:not(#stars) {
    position: relative;
    z-index: 1;
}

/* FINAL */
#final {
    display:none;
    margin-top:30px;
    opacity:0;
    transition:1s;
}

.final-container {
    display:flex;
    justify-content:space-between;
    gap:30px;
    flex-wrap:wrap;
}

.lado-texto {
    flex:1;
    min-width:250px;
    text-align:left;
}

.extra {
    opacity:0;
    transition:2s;
}

.lado-coracao {
    flex:1;
    text-align:center;
}

.heart-img {
    width:130px;
}

.particle {
    position:absolute;
    animation: subir 4s linear infinite;
}

@keyframes subir {
    from { transform: translateY(0); opacity:1; }
    to { transform: translateY(-300px); opacity:0; }
}

/* MOBILE */
@media (max-width: 600px) {
    .final-container {
        flex-direction:column;
        text-align:center;
    }

    .lado-texto {
        text-align:center;
    }
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div class="intro-content">
        <h1>💖</h1>
        <p>Clique para começar</p>
    </div>
</div>

<div class="page">

<div id="container">

<div id="stars"></div>

<h1>NOMEDELA 💖</h1>

<h2>✨ Uma pequena história ✨</h2>
<p id="texto"></p>

<button onclick="proximoTexto()">Continuar 💌</button>

<div id="final">
    <div class="final-container">

        <div class="lado-texto">
            <p>
                Esse é todo o tempo que te conheço…<br><br>
                E a cada segundo que passa,<br>
                você se torna alguém ainda mais especial 💖
            </p>

            <p id="msgExtra" class="extra">
                Quero muito mais tempo ao seu lado 💕
            </p>
        </div>

        <div class="lado-coracao">
            <img class="heart-img" src="https://images.vexels.com/media/users/3/151200/isolated/preview/71b99b7323bfd07bab3fc7dd973261e1-elemento-hippie-coracao-vermelho.png">
            <div id="tempo"></div>
        </div>

    </div>
</div>

</div>
</div>

<script>

/* INTRO */
const intro = document.getElementById("intro");
const page = document.querySelector(".page");

intro.addEventListener("click", () => {
    intro.style.opacity = "0";

    setTimeout(() => {
        intro.style.display = "none";
        page.style.opacity = "1";
        page.style.transform = "scale(1)";
    }, 800);
});

/* HISTORIA */
const historia = [ 
    "Oi... eu preparei isso só pra você 💖",
    "Talvez você nem imagine o quanto é importante pra mim...",
    "Mas tudo começou em um dia bem específico...",
    "Um dia que, sem perceber, mudou tudo ✨",
    "Desde então, cada conversa, cada risada...",
    "foi se tornando algo que eu guardo com muito carinho ❤️",
    "Sem perceber acabei amando o jeito que você fala",
    "E amando o jeito que você sente",
    "Quando jogamos juntos é um momento maravilhoso para mim",
    "Já passamos por muitas coisas e desentendimentos,mas se nossa amizade continua forte aqui, não é algo passageiro",
    "Mas ainda tem algo que eu preciso te mostrar...",
    
    "Porque não é só sobre momentos...",
    "É sobre como você faz tudo parecer mais leve 🌸",
    "Mesmo nos dias difíceis, você consegue trazer paz pro meu coração",
    "E eu nem sei explicar direito como isso acontece...",
    "Só sei que acontece, e é especial ✨",
    
    "Seu jeito ficou guardado em mim",
    "Nas pequenas coisas, nos detalhes...",
    "Na forma como você ri, como você reage, como você existe 💫",
    
    "E talvez eu nunca tenha dito isso claramente...",
    "Mas você faz diferença na minha vida, muita diferença ❤️",
    
    "Não importa o tempo que passe...",
    "Nem a distância, nem as fases...",
    "Tem coisas que simplesmente ficam...",
    "E você é uma delas 💖",
    
    "Se um dia você duvidar do seu valor...",
    "Eu espero que lembre de tudo isso",
    "Porque pra mim...",
    "Você é alguém impossível de esquecer ✨"
];

let index = 0;
let digitando = false;

function proximoTexto() {
    if (digitando) return;

    if (index < historia.length) {
        escreverTexto(historia[index]);
        index++;
    } else {
        mostrarFinal();
    }
}

function escreverTexto(texto) {
    digitando = true;
    const el = document.getElementById("texto");

    el.style.opacity = 0;

    setTimeout(() => {
        el.innerHTML = texto;
        el.style.opacity = 1;
        digitando = false;
    }, 200);
}

function mostrarFinal() {
    document.getElementById("botao")?.remove();
    document.getElementById("texto").style.display = "none";

    const final = document.getElementById("final");
    final.style.display = "block";

    setTimeout(() => final.style.opacity = "1", 50);

    iniciarContador();
    criarParticulas();

    setTimeout(() => {
        document.getElementById("msgExtra").style.opacity = "1";
    }, 3000);
}

/* CONTADOR */
const dataInicio = new Date("2024-05-10");

function iniciarContador() {
    setInterval(() => {
        const diff = new Date() - dataInicio;

        const dias = Math.floor(diff / (1000*60*60*24));
        const horas = Math.floor((diff/(1000*60*60))%24);
        const minutos = Math.floor((diff/(1000*60))%60);

        document.getElementById("tempo").innerText =
            dias + " dias - " + horas + "h " + minutos + "m";
    }, 1000);
}

/* PARTICULAS */
function criarParticulas() {
    setInterval(() => {
        const p = document.createElement("div");
        p.className = "particle";
        p.innerText = Math.random() > 0.5 ? "💖" : "✨";
        p.style.left = Math.random() * 100 + "%";

        document.getElementById("final").appendChild(p);

        setTimeout(() => p.remove(), 4000);
    }, 300);
}

/* ESTRELAS */
function criarEstrelas() {
    const c = document.getElementById("stars");

    for (let i = 0; i < 80; i++) {
        const s = document.createElement("div");
        s.className = "star";

        s.style.top = Math.random() * 100 + "%";
        s.style.left = Math.random() * 100 + "%";

        c.appendChild(s);
    }
}

criarEstrelas();

</script>

</body>
</html>
