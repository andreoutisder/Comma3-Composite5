<div id="container" style="text-align:center; font-family: Arial; padding:20px; max-width:700px; margin:auto; background:black; color:white; border-radius:20px; overflow:hidden; position:relative;">

    <!-- FUNDO ESTRELAS -->
    <div id="stars"></div>

    <h1 class="nome-brilho">NOMEDELA 💖</h1>

    <h2 style="margin-top:30px;">✨ Uma pequena história ✨</h2>
    <p id="texto" style="font-size:18px; min-height:100px;"></p>

    <button onclick="proximoTexto()" id="botao" style="margin-top:20px; padding:10px 20px; border:none; border-radius:10px; background:#ff69b4; color:white; cursor:pointer;">
        Continuar 💌
    </button>

    <!-- FINAL -->
    <div id="final">

        <div class="final-container">

            <div class="lado-texto">
                <p class="frase">
                    Esse é todo o tempo que te conheço…<br><br>
                    E a cada segundo que passa,<br>
                    você se torna alguém ainda mais especial<br>
                    e importante pra mim 💖
                </p>

                <p id="msgExtra" class="extra">
                    E eu ainda quero muito mais tempo ao seu lado <br>
                    fazendo com que nossa amizade se torne ainda mais forte 💕
                </p>
            </div>

            <div class="lado-coracao">
                <img class="heart-img" src="https://images.vexels.com/media/users/3/151200/isolated/preview/71b99b7323bfd07bab3fc7dd973261e1-elemento-hippie-coracao-vermelho.png">
                <div id="tempo"></div>
            </div>

        </div>

    </div>

</div>

<style>
.nome-brilho {
    font-size: 50px;
    color: #fff;
    text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
}

/* TEXTO FADE */
#texto {
    opacity: 1;
    transition: opacity 0.5s ease;
}

/* FUNDO ESTRELAS */
#stars {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: piscar 2s infinite alternate;
}

@keyframes piscar {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

#container > *:not(#stars) {
    position: relative;
    z-index: 1;
}

/* FINAL */
#final {
    display:none;
    width:100%;
    margin-top:30px;
    opacity:0;
    transition:1s;
}

.final-container {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;
}

.lado-texto {
    flex:1;
    min-width:250px;
    text-align:left;
}

.frase {
    font-size:18px;
    line-height:1.6;
}

.extra {
    margin-top:20px;
    opacity:0;
    transition:2s;
}

.lado-coracao {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin-top:10px;
}

.heart-img {
    width:130px;
    max-width:100%;
    display:block;
    margin:0 auto;
    filter:
        drop-shadow(0 0 10px rgba(255, 80, 100, 0.6))
        drop-shadow(0 0 20px rgba(255, 50, 80, 0.4));
}

#tempo {
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    text-align:center;
}

.particle {
    position:absolute;
    font-size:18px;
    animation: subir 4s linear infinite;
}

@keyframes subir {
    from { transform: translateY(0); opacity:1; }
    to { transform: translateY(-300px); opacity:0; }
}

@media (max-width: 600px) {
    .final-container {
        flex-direction:column;
        text-align:center;
    }

    .lado-texto {
        text-align:center;
    }

    .heart-img {
        width:110px;
    }
}
</style>

<script>
const historia = [ 
    "Oi... eu preparei isso só pra você 💖",
    "Talvez você nem imagine o quanto é importante pra mim...",
    "Mas tudo começou em um dia bem específico...",
    "Um dia que, sem perceber, mudou tudo ✨",
    "Desde então, cada conversa, cada risada...",
    "foi se tornando algo que eu guardo com muito carinho ❤️",
    "Sem perceber acabei amando o jeito que você fala",
    "E amando o jeito que você sente",
    "Quando jogamos juntos é um momento maravilhoso para mim",
    "Já passamos por muitas coisas e desentendimentos,mas se nossa amizade continua forte aqui, não é algo passageiro",
    "Mas ainda tem algo que eu preciso te mostrar...",
    
    "Porque não é só sobre momentos...",
    "É sobre como você faz tudo parecer mais leve 🌸",
    "Mesmo nos dias difíceis, você consegue trazer paz pro meu coração",
    "E eu nem sei explicar direito como isso acontece...",
    "Só sei que acontece, e é especial ✨",
    
    "Seu jeito ficou guardado em mim",
    "Nas pequenas coisas, nos detalhes...",
    "Na forma como você ri, como você reage, como você existe 💫",
    
    "E talvez eu nunca tenha dito isso claramente...",
    "Mas você faz diferença na minha vida, muita diferença ❤️",
    
    "Não importa o tempo que passe...",
    "Nem a distância, nem as fases...",
    "Tem coisas que simplesmente ficam...",
    "E você é uma delas 💖",
    
    "Se um dia você duvidar do seu valor...",
    "Eu espero que lembre de tudo isso",
    "Porque pra mim...",
    "Você é alguém impossível de esquecer ✨"
];

let index = 0;
let digitando = false;

function proximoTexto() {
    if (digitando) return;

    if (index < historia.length) {
        escreverTexto(historia[index]);
        index++;
    } else {
        mostrarFinal();
    }
}

function escreverTexto(texto) {
    digitando = true;
    const el = document.getElementById("texto");

    el.style.opacity = 0;

    setTimeout(() => {
        el.innerHTML = texto;
        el.style.opacity = 1;
        digitando = false;
    }, 200);
}

function mostrarFinal() {
    document.getElementById("botao").style.display = "none";
    document.getElementById("texto").style.display = "none";

    const final = document.getElementById("final");
    final.style.display = "block";

    setTimeout(() => {
        final.style.opacity = "1";
    }, 50);

    iniciarContador();
    criarParticulas();

    setTimeout(() => {
        document.getElementById("msgExtra").style.opacity = "1";
    }, 3000);
}

const dataInicio = new Date("2024-05-10T00:00:00");

function iniciarContador() {
    setInterval(() => {
        const agora = new Date();
        const diff = agora - dataInicio;

        const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
        const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutos = Math.floor((diff / (1000 * 60)) % 60);

        document.getElementById("tempo").innerText =
            dias + " dias - " + horas + "h " + minutos + "m";
    }, 1000);
}

function criarParticulas() {
    setInterval(() => {
        const p = document.createElement("div");
        p.className = "particle";
        p.innerText = Math.random() > 0.5 ? "💖" : "✨";
        p.style.left = Math.random() * 100 + "%";
        p.style.bottom = "0px";

        document.getElementById("final").appendChild(p);

        setTimeout(() => p.remove(), 4000);
    }, 300);
}

/* ESTRELAS */
function criarEstrelas() {
    const container = document.getElementById("stars");

    for (let i = 0; i < 80; i++) {
        const estrela = document.createElement("div");
        estrela.className = "star";

        estrela.style.top = Math.random() * 100 + "%";
        estrela.style.left = Math.random() * 100 + "%";
        estrela.style.animationDuration = (Math.random() * 2 + 1) + "s";

        container.appendChild(estrela);
    }
}

criarEstrelas();
</script>
